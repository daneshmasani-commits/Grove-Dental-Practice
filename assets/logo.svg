<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" role="img" aria-label="Grove Dental Practice">
  <!--
    Grove Dental Practice logo lockup.
    Monoline / geometric tooth with a small leaf sprout ("grove" botanical motif).
    Single-colour: inherits currentColor, so it adapts to any theme colour.
  -->
  <g fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tooth -->
    <path d="M20 16
             C15 16 12 19.5 12 25
             C12 30 13.5 34 15 40
             C16 45 16.5 50 19 50
             C21 50 21.5 45 22.5 41
             C23 38.5 24.2 37 26 37
             C27.8 37 29 38.5 29.5 41
             C30.5 45 31 50 33 50
             C35.5 50 36 45 37 40
             C38.5 34 40 30 40 25
             C40 19.5 37 16 32 16
             C28.5 16 27 18 26 18
             C25 18 23.5 16 20 16 Z"/>
    <!-- Leaf sprout / grove motif rising from the crown -->
    <path d="M26 16 C26 12 26 9.5 26 7"/>
    <path d="M26 9.5 C28.5 6.5 32 6.5 34.5 8 C32.5 11 28.5 11.5 26 9.5 Z"/>
  </g>
  <text x="58" y="33" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="23" font-weight="600" letter-spacing="0.2" fill="currentColor">Grove</text>
  <text x="58" y="50" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="11.5" font-weight="500" letter-spacing="2.4" fill="currentColor">DENTAL PRACTICE</text>
</svg>
